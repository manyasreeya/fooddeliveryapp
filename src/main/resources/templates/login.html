<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Savor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-wrapper { display: flex; min-height: 100vh; background: var(--white); }
        .auth-image { flex: 1.2; background: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; position: relative; }
        .auth-image-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,71,87,0.85), rgba(0,0,0,0.6)); display: flex; align-items: center; justify-content: center; padding: 40px; }
        .auth-quote { color: white; max-width: 500px; text-align: center; }
        .auth-quote h1 { font-size: 3.5rem; margin-bottom: 20px; line-height: 1.1; }
        .auth-quote p { font-size: 1.2rem; font-weight: 300; opacity: 0.9; }
        
        .auth-form-container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 8%; background: var(--white); max-width: 700px; position: relative; }
        
        .back-home { position: absolute; top: 40px; right: 8%; color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: color 0.3s; display: flex; align-items: center; gap: 8px; }
        .back-home:hover { color: var(--dark); }
        
        .auth-header { margin-bottom: 40px; }
        .auth-header h2 { font-size: 2.5rem; color: var(--dark); margin-bottom: 10px; letter-spacing: -0.5px; }
        .auth-header p { color: var(--text-muted); font-size: 1.1rem; }
        
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--dark); font-size: 0.95rem; }
        .form-control { width: 100%; padding: 18px 20px; border: 2px solid #e1e4e8; border-radius: 12px; font-size: 1.05rem; font-family: var(--font-sans); transition: all 0.3s; background: #f8f9fa; color: var(--dark); }
        .form-control:focus { outline: none; border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 4px rgba(255,71,87,0.1); }
        
        .btn-auth { width: 100%; padding: 18px; font-size: 1.1rem; font-weight: 800; border-radius: 12px; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .auth-links { margin-top: 35px; text-align: center; font-size: 1.05rem; color: var(--text-muted); }
        .auth-links a { color: var(--primary); font-weight: 800; text-decoration: none; transition: color 0.3s; }
        .auth-links a:hover { color: var(--primary-dark); text-decoration: underline; }
        
        .error-box { background: rgba(255,71,87,0.08); color: var(--primary-dark); padding: 16px 20px; border-radius: 12px; margin-bottom: 25px; font-weight: 600; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,71,87,0.2); }
        
        @media (max-width: 992px) {
            .auth-image { display: none; }
            .auth-form-container { max-width: 100%; padding: 40px 5%; }
            .back-home { top: 20px; right: 5%; }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-image">
            <div class="auth-image-overlay">
                <div class="auth-quote">
                    <h1>Savor the <br> Moments.</h1>
                    <p>Log in to reorder your favorites, track deliveries in real-time, and experience culinary excellence.</p>
                </div>
            </div>
        </div>
        
        <div class="auth-form-container">
            <a href="/" class="back-home">Go back to Store <i class="fa-solid fa-arrow-right"></i></a>
            
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>
            </div>
            
            <div th:if="${error != null}" class="error-box">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span th:text="${error}">An error occurred.</span>
            </div>
            
            <div th:if="${param.logout}" class="error-box" style="background: rgba(46, 213, 115, 0.1); color: var(--accent-dark); border-color: rgba(46, 213, 115, 0.3);">
                <i class="fa-solid fa-check-circle"></i>
                <span>You have been successfully logged out.</span>
            </div>

            <form action="/login" method="post">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="hello@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-auth">Sign In</button>
            </form>
            
            <div class="auth-links">
                Don't have an account? <a th:href="@{/signup}">Create one now</a>
            </div>
        </div>
    </div>

</body>
</html>
